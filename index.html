<!DOCTYPE html>
<!-- GitHub Pages: Repository Settings → Pages → Build: GitHub Actions → Save. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        try {
          var k = "bib-theme";
          var s = localStorage.getItem(k);
          var d = document.documentElement;
          if (s === "light" || s === "dark") {
            d.setAttribute("data-theme", s);
          } else {
            d.setAttribute(
              "data-theme",
              window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
            );
          }
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title id="page-title">ML for Systems</title>
    <meta name="description" content="Catalog of papers" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css?v=1" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <div class="site-header__text">
          <h1 class="site-title" id="site-title">
            <a href="./" class="site-title__link" aria-current="page">ML for Systems</a>
          </h1>
        </div>
        <nav class="site-header__nav" aria-label="Site">
          <a class="site-header__nav-link" href="./venues.html">Venues</a>
          <a class="site-header__nav-link" href="./add-paper.html">Contribute</a>
          <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle color theme">
            <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
              <path
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
              />
            </svg>
            <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"
              />
            </svg>
          </button>
        </nav>
      </div>
    </header>

    <section class="dashboard" aria-label="Overview">
      <div class="dashboard__grid">
        <div class="dash-card dash-card--stats">
          <div class="dash-stat">
            <div class="dash-stat__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 10v6M12 12L2 7l10-5 10 5-10 5z" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
            <div class="dash-stat__body">
              <span class="dash-stat__value" id="stat-papers">—</span>
              <span class="dash-stat__label">Papers</span>
            </div>
          </div>
          <div class="dash-stat">
            <div class="dash-stat__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-linecap="round" />
                <circle cx="9" cy="7" r="4" />
                <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke-linecap="round" />
              </svg>
            </div>
            <div class="dash-stat__body">
              <span class="dash-stat__value" id="stat-authors">—</span>
              <span class="dash-stat__label">Authors</span>
            </div>
          </div>
          <div class="dash-stat">
            <div class="dash-stat__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4M9 9v0M9 12v0" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
            <div class="dash-stat__body">
              <span class="dash-stat__value" id="stat-venues">—</span>
              <span class="dash-stat__label">Venues / journals</span>
            </div>
          </div>
        </div>
        <div class="dash-card dash-card--chart" id="dashboard-chart-years"></div>
        <div class="dash-card dash-card--chart" id="dashboard-chart-venues"></div>
      </div>
    </section>

    <div class="layout">
      <aside class="sidebar" aria-label="Filters and charts">
        <div class="search-wrap">
          <label class="visually-hidden" for="search-input">Search papers</label>
          <input
            type="search"
            id="search-input"
            placeholder="Search title, author, venue, tags…"
            autocomplete="off"
          />
        </div>

        <section>
          <h2>Year</h2>
          <label class="visually-hidden" for="filter-year">Filter by year</label>
          <select id="filter-year"></select>
        </section>

        <section>
          <h2>Venue</h2>
          <label class="visually-hidden" for="filter-venue">Filter by venue</label>
          <select id="filter-venue"></select>
        </section>

        <section>
          <h2>Tags</h2>
          <p style="margin: 0 0 0.5rem; font-size: 0.78rem; color: var(--muted)">
            Parsed from the <code>labels</code> field in BibTeX (comma- or semicolon-separated). Omit the field for no tags.
          </p>
          <div class="filter-group filter-group--tags" id="filter-tags"></div>
        </section>
      </aside>

      <main class="main-panel">
        <p id="load-error" class="error" hidden></p>
        <p id="bib-parse-warning" class="bib-parse-warning" hidden></p>
        <h2 id="paper-count" style="margin-top: 0">Loading…</h2>
        <div class="paper-list" id="papers-root"></div>
      </main>
    </div>

    <footer class="site-footer">
      <p>
        <a href="./venues.html">Venues</a>
        · <a href="./add-paper.html">Contribute</a>
        · Static site · Edit <code>papers.bib</code> and push to update ·
        <a href="https://pages.github.com/">GitHub Pages</a>
      </p>
    </footer>

    <script>
      (function () {
        var b = document.getElementById("theme-toggle");
        if (!b) return;
        var t = document.documentElement.getAttribute("data-theme");
        b.setAttribute("aria-label", t === "dark" ? "Switch to light mode" : "Switch to dark mode");
      })();
    </script>
    <script type="module" src="./js/app.js?v=11"></script>
  </body>
</html>
